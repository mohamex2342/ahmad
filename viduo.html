<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الفيديوهات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.3;
        }

        .bg-animation::before {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        h1 {
            text-align: center;
            margin: 40px 0 50px;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .video-item {
            position: relative;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            background: #1e1e2e;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }

        .video-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.3);
            border-color: #4facfe;
        }

        .video-wrapper {
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
        }

        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: rgba(79, 172, 254, 0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }

        .play-overlay::after { content: '▶'; color: white; font-size: 24px; margin-right: -4px; }

        .video-item:hover .play-overlay { opacity: 1; }

        .video-info {
            padding: 15px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-title { font-size: 0.95rem; font-weight: 600; }

        .video-duration {
            font-size: 0.8rem;
            color: #4facfe;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 8px;
        }

        .video-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            justify-content: center; align-items: center;
        }

        .video-modal.active { display: flex; }

        .modal-content { width: 90%; max-width: 1000px; position: relative; }

        .modal-content video { width: 100%; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        .close-btn {
            position: absolute; top: -50px; right: 0;
            color: white; font-size: 35px; cursor: pointer;
            transition: 0.3s;
        }
        .close-btn:hover { color: #ff4b2b; }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .gallery-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <h1>معرض الفيديوهات</h1>

    <div class="gallery-container">
        
        <div class="video-item" onclick="openVideo('videos/video1.mp4')">

            </div>
        </div>

    </div>

    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeVideo()">×</div>
            <video id="fullVideo" controls></video>
        </div>
    </div>

    <script>
        const modal = document.getElementById("videoModal");
        const fullVideo = document.getElementById("fullVideo");

        // جلب مدد الفيديوهات ومعاينة عند المرور
        document.querySelectorAll('.video-item').forEach(item => {
            const video = item.querySelector('video');
            const durationSpan = item.querySelector('.video-duration');
            
            video.addEventListener('loadedmetadata', () => {
                const mins = Math.floor(video.duration / 60);
                const secs = Math.floor(video.duration % 60);
                durationSpan.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            });

            item.addEventListener('mouseenter', () => video.play().catch(() => {}));
            item.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime = 0;
            });
        });

        function openVideo(src) {
            modal.classList.add('active');
            fullVideo.src = src;
            fullVideo.play();
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            modal.classList.remove('active');
            fullVideo.pause();
            fullVideo.src = "";
            document.body.style.overflow = 'auto';
        }

        modal.onclick = (e) => { if(e.target === modal) closeVideo(); };
    </script>

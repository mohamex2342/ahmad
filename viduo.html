<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الفيديوهات </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        h1 {
            text-align: center;
            margin: 40px 0 50px;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            text-shadow: 0 0 30px rgba(79, 172, 254, 0.3);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* شبكة الفيديوهات المحسّنة */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .video-item {
            position: relative;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            background: linear-gradient(145deg, #1e1e2e, #2d2d44);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.3);
            border-color: rgba(79, 172, 254, 0.5);
        }

        .video-item:hover::before {
            opacity: 1;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .video-item:hover video {
            transform: scale(1.1);
        }

        /* أيقونة التشغيل */
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(79, 172, 254, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
        }

        .play-overlay::after {
            content: '▶';
            color: white;
            font-size: 28px;
            margin-right: -5px;
        }

        .video-item:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* معلومات الفيديو */
        .video-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            z-index: 2;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .video-item:hover .video-info {
            transform: translateY(0);
            opacity: 1;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .video-duration {
            display: inline-block;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #4facfe;
            font-weight: 600;
        }

        /* نافذة العرض بكامل الشاشة المحسّنة */
        .video-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1200px;
            animation: modalEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalEnter {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .video-modal video {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 24px;
            color: white;
            z-index: 1001;
        }

        .close-btn:hover {
            background: rgba(255,0,0,0.8);
            border-color: rgba(255,0,0,0.8);
            transform: rotate(90deg);
        }

        /* مؤشر التحميل */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* شريط التمرير المخصص */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0f0c29;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border-radius: 5px;
        }

        /* تأثيرات إضافية للهواتف */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .gallery-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .play-overlay { opacity: 1; }
            .video-info { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <h1> فيديوهات</h1>

        </div>
        </div>
    </div>

    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeVideo()">×</div>
            <video id="fullVideo" controls></video>
        </div>
    </div>

    <script>
        const modal = document.getElementById("videoModal");
        const fullVideo = document.getElementById("fullVideo");
        let currentVideo = null;

        // تحميل مدد الفيديوهات تلقائياً
        document.querySelectorAll('.video-item').forEach(item => {
            const video = item.querySelector('video');
            const durationSpan = item.querySelector('.video-duration');
            
            video.addEventListener('loadedmetadata', () => {
                const minutes = Math.floor(video.duration / 60);
                const seconds = Math.floor(video.duration % 60);
                durationSpan.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            });

            // معاينة الفيديو عند التمرير (Hover)
            item.addEventListener('mouseenter', () => {
                video.play().catch(e => console.log('Autoplay prevented'));
            });

            item.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime = 0;
            });
        });

        function openVideo(videoSrc, title) {
            currentVideo = videoSrc;
            modal.classList.add('active');
            fullVideo.src = videoSrc;
            
            // تأخير بسيط للتشغيل لإظهار الأنيميشن أولاً
            setTimeout(() => {
                fullVideo.play().catch(e => console.log('Autoplay prevented in modal'));
            }, 300);
            
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            modal.classList.remove('active');
            setTimeout(() => {
                fullVideo.pause();
                fullVideo.src = "";
            }, 300);
            document.body.style.overflow = 'auto';
        }

        // إغلاق عند الضغط على ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeVideo();
        });

        // إغلاق عند الضغط خارج الفيديو
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeVideo();
        });

        // منع إغلاق النافذة عند الضغط على عناصر التحكم
        document.querySelector('.modal-content').addEventListener('click', (e) => {
            e.stopPropagation();
        });
    </script>
